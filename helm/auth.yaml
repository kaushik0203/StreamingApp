apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: streamingapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: 712934828955.dkr.ecr.ap-south-1.amazonaws.com/streamingapp-auth:latest
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: MONGO_URI
          value: "mongodb://mongo:27017/streamingapp"
        - name: JWT_SECRET
          value: "changeme"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: streamingapp
spec:
  selector:
    app: auth
  ports:
  - port: 3001
    targetPort: 3001
